# Talos + homelab defaults. Longhorn is the DEFAULT StorageClass on homelab-kvm, so
# apps with no explicit storageClass (Harbor's PVCs) bind here automatically.
defaultSettings:
  # /var/lib/longhorn is writable on Talos. No dedicated data disk on these nodes yet,
  # so replicas live on the root disk — revisit a data disk if usage grows.
  defaultDataPath: /var/lib/longhorn
  defaultReplicaCount: 2          # 2 of 3 control planes currently schedulable
  # keep volumes if a node is briefly down rather than rebuilding aggressively
  replicaAutoBalance: best-effort

persistence:
  defaultClass: true              # the cluster default StorageClass
  defaultClassReplicaCount: 2
  reclaimPolicy: Retain           # precious data (registry) — don't delete PV on PVC delete

longhornUI:
  replicas: 1
