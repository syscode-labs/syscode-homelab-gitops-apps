# Talos inline manifests for the unraid-lab cluster bootstrap.
#
# Talos applies these on the first control-plane node before any scheduler is up.
# They install Argo CD; three seeded roots then pull everything else from this
# repo ("install Argo, then fetch the rest remotely"):
#
#   apps       (ApplicationSet)  -> apps/* + types/homelab-kvm/apps/* + clusters/unraid-lab/apps/*
#                                   chart-apps, values layered base -> type -> cluster
#   bootstrap  (Application)     -> bootstrap/                shared raw manifests (tailscale operator)
#   unraid-raw (Application)     -> clusters/unraid-lab/apps/*/application.yaml
#                                   custom ApplicationSets that aren't chart-apps (arc-runners)
#
# The chart-app lane keys on app.yaml; the raw lane keys on application.yaml — so
# arc-runners (an ApplicationSet, application.yaml) and harbor/arc-controller
# (chart-apps, app.yaml) never double-manage.
#
# Argo CD (and Cilium, IF unraid-lab is CNI-none like OCI — the CNI decision lives
# in omni-on-unraid) are filled by the generate step, same pattern as OCI.

cluster:
  inlineManifests:
    - name: argocd
      contents: |
        # !!! PLACEHOLDER — raw Argo CD install manifest (namespace argocd) !!!
        # Source: curl -sL https://raw.githubusercontent.com/argoproj/argo-cd/<ARGOCD_VERSION>/manifests/install.yaml

    - name: argocd-apps
      contents: |
        # Chart-app lane — inject repo-root appset.yaml with THIS cluster's identity:
        #   clusterName: unraid-lab, clusterType: homelab-kvm
        #
        # !!! generate step injects appset.yaml here !!!

    - name: argocd-bootstrap
      contents: |
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: bootstrap
          namespace: argocd
        spec:
          project: default
          source:
            repoURL: https://github.com/syscode-labs/syscode-homelab-gitops-apps
            targetRevision: HEAD
            path: bootstrap
          destination:
            server: https://kubernetes.default.svc
            namespace: argocd
          syncPolicy:
            automated:
              prune: true
              selfHeal: true

    - name: argocd-unraid-raw
      contents: |
        # Raw lane for unraid-lab custom ApplicationSets (arc-runners).
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: unraid-raw
          namespace: argocd
        spec:
          project: default
          source:
            repoURL: https://github.com/syscode-labs/syscode-homelab-gitops-apps
            targetRevision: HEAD
            path: clusters/unraid-lab/apps
            directory:
              recurse: true
              include: "*/application.yaml"
          destination:
            server: https://kubernetes.default.svc
            namespace: argocd
          syncPolicy:
            automated:
              prune: true
              selfHeal: true
            syncOptions:
              - CreateNamespace=true
