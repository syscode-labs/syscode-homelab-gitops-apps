# Talos inline manifests applied during cluster bootstrap by the first control plane node.
# These run before any workload scheduler is up, so they must be self-contained YAML.
#
# REGENERATE after Cilium/Argo CD version bumps:
#   mise run oci:generate-manifests
#
# Cilium is configured for:
#   - kubeProxyReplacement=true (Talos, no kube-proxy)
#   - k8sServiceHost=localhost, k8sServicePort=7445 (KubePrism — node-local API proxy)
#   - ipam.mode=kubernetes
#
# Argo CD is the raw upstream install manifest + an inline root Application.
# The root Application syncs bootstrap/; bootstrap/argocd-app-of-apps.yaml fans
# out to infrastructure/*/application.yaml. Argo CD does not sync omni/.

cluster:
  inlineManifests:
    - name: cilium
      contents: |
        # Generated by: mise run oci:generate-manifests
        # Source: helm template cilium cilium/cilium --version <CILIUM_VERSION> \
        #   --namespace kube-system \
        #   --set kubeProxyReplacement=true \
        #   --set k8sServiceHost=localhost \
        #   --set k8sServicePort=7445 \
        #   --set ipam.mode=kubernetes \
        #   --set hubble.relay.enabled=true \
        #   --set hubble.ui.enabled=true
        #
        # Run: mise run oci:generate-manifests  — output replaces this block
        #
        # !!! PLACEHOLDER — run mise run oci:generate-manifests to populate !!!

    - name: argocd
      contents: |
        # Generated by: mise run oci:generate-manifests
        # Source: curl -sL https://raw.githubusercontent.com/argoproj/argo-cd/<ARGOCD_VERSION>/manifests/install.yaml
        # Namespace: argocd
        #
        # Run: mise run oci:generate-manifests  — output replaces this block
        #
        # !!! PLACEHOLDER — run mise run oci:generate-manifests to populate !!!

    - name: argocd-apps
      contents: |
        # Chart-app lane — the layering ApplicationSet. The generate step injects
        # the repo-root appset.yaml with THIS cluster's identity:
        #   clusterName: oci-talos, clusterType: cloud
        # It deploys apps/* (shared) + types/cloud/apps/* + clusters/oci-talos/apps/*
        # with values layered base -> type -> cluster.
        #
        # !!! run: mise run oci:generate-manifests — injects appset.yaml here !!!

    - name: argocd-bootstrap
      contents: |
        # Raw-manifest lane: syncs bootstrap/ (shared non-chart manifests, e.g.
        # the Tailscale operator).
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: bootstrap
          namespace: argocd
        spec:
          project: default
          source:
            repoURL: https://github.com/syscode-labs/syscode-homelab-gitops-apps
            targetRevision: HEAD
            path: bootstrap
          destination:
            server: https://kubernetes.default.svc
            namespace: argocd
          syncPolicy:
            automated:
              prune: true
              selfHeal: true
