# Longhorn needs a privileged PodSecurity namespace (Talos enforces baseline, which
# blocks Longhorn's privileged / hostPath pods). Created here in the shared bootstrap
# lane; ServerSideApply merges these labels onto the namespace even if the Longhorn
# ApplicationSet created it bare first. Harmless on clusters that don't run Longhorn.
apiVersion: v1
kind: Namespace
metadata:
  name: longhorn-system
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
